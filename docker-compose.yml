services:
  vpn-invite-service:
    build: .
    container_name: vpn-invite-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - /etc/wireguard:/etc/wireguard
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
